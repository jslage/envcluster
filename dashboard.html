<!DOCTYPE html>
<html>

<head>
    <title>Cluster Environment Archetypes</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body {
            display: flex;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            background: #111;
            color: #eee;
        }

        #plot-container {
            flex: 1;
            padding: 20px;
        }

        #image-container {
            width: 600px;
            background: #1a1a1a;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #333;
        }

        img {
            max-width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            object-fit: contain;
            border-radius: 8px;
        }

        h2 {
            margin-top: 0;
            font-weight: 400;
            color: #ddd;
        }

        #instructions {
            color: #888;
            text-align: center;
            font-size: 16px;
            margin-top: 20px;
            line-height: 1.5;
        }

        .watermark {
            margin-top: 20px;
            font-size: 12px;
            color: #444;
        }
    </style>
</head>

<body>
    <div id="plot-container">
        <div id="plot" style="width:100%;height:100%;"></div>
    </div>
    <div id="image-container">
        <h2 id="cluster-title">Select an archetypal cluster</h2>
        <img id="cluster-image" src="" alt="Cluster previews will appear here" style="display:none;" />
        <div id="instructions">
            Click on any centroid point in the PCA scatter plot to the left.<br><br>
        </div>
    </div>

        const trace = {
            x: data.map(d => d.x),
            y: data.map(d => d.y),
            mode: 'markers',
            type: 'scatter',
            marker: {
                size: 16,
                color: '#e74c3c',
                line: { color: '#fff', width: 2 },
                opacity: 0.8
            },
            text: data.map(d => 'Cluster ' + d.cluster),
            customdata: data.map(d => d.cluster),
            hoverinfo: 'text'
        };

        const layout = {
            title: { text: 'Wildfire Environment Archetypes (PCA Centroids)', font: { color: '#fff', size: 24 } },
            plot_bgcolor: '#111',
            paper_bgcolor: '#111',
            xaxis: { gridcolor: '#222', zerolinecolor: '#444', title: 'PCA Component 1', titlefont: { color: '#bbb' }, tickfont: { color: '#888' } },
            yaxis: { gridcolor: '#222', zerolinecolor: '#444', title: 'PCA Component 2', titlefont: { color: '#bbb' }, tickfont: { color: '#888' } },
            hovermode: 'closest',
            margin: { t: 80, b: 60, l: 60, r: 40 }
        };

        const config = { responsive: true, displayModeBar: false };

        Plotly.newPlot('plot', [trace], layout, config);

        document.getElementById('plot').on('plotly_click', function (data) {
            var clusterId = data.points[0].customdata;
            document.getElementById('cluster-title').innerText = 'Cluster ' + clusterId + ' Top 4 Environments';
            var img = document.getElementById('cluster-image');
            // Adding timestamp to force refresh if image updates
            img.src = 'images/cluster_' + clusterId + '.png?' + new Date().getTime();
            img.style.display = 'block';
            document.getElementById('instructions').style.display = 'none';
        });
    </script>
</body>

</html>
